<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>breathe.</title>
  <meta name="description" content="Beautifully simple breathwork. Calm, focus, energy, sleep." />

  <!-- PWA -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#0a0a0b" />
  <link rel="icon" href="./icons/favicon.png" type="image/png" />

  <!-- iOS standalone / home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="breathe." />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />

  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app" aria-live="polite"></div>
  <nav id="tabbar" class="tabbar" hidden></nav>

  <!-- iOS Taptic Engine trigger: toggling an <input switch> fires a haptic tap
       on Safari 17.4+. Kept off-screen (not display:none) so the toggle registers. -->
  <input type="checkbox" switch id="haptic" aria-hidden="true" tabindex="-1"
    style="position:fixed; left:-9999px; top:0; width:1px; height:1px; opacity:0; pointer-events:none;" />

  <script src="./app.js" type="module"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
